name: dharma_police
description: "Dharma CMS — Police Command Center"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──
  provider: ^6.1.1

  # ── Routing ──
  go_router: ^13.0.0

  # ── Firebase (Auth ONLY — NO Firestore) ──
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.1
  firebase_app_check: 0.3.2+10

  # ── HTTP / API ──
  dio: ^5.4.0

  # ── UI Components ──
  flutter_svg: ^2.2.1
  pin_code_fields: ^8.0.1
  url_launcher: ^6.3.2
  smooth_page_indicator: ^1.1.0

  # ── Utils ──
  intl: ^0.20.2
  file_picker: ^8.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svg/
    - assets/data/
