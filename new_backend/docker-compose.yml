# Dharma CMS — Local Development Stack
# Usage:  docker-compose up --build
# API:    http://localhost:8000
# Swagger: http://localhost:8000/docs
# DB:     localhost:5432  (user: dharma, password: dharma, db: dharma_cms)

version: "3.9"

services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Connect to remote PostgreSQL database
      DATABASE_URL: postgresql+asyncpg://postgres:Server@098123@100.90.109.30:5432/dharmacms
      # Firebase credential path INSIDE the container
      FIREBASE_CREDENTIALS: /app/firebase-credentials.json
    volumes:
      # Mount your Firebase service account JSON (update left-hand path)
      # Download from Firebase Console > Project Settings > Service Accounts
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
